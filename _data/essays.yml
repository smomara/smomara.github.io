- title: The Techno-Optimist Manifesto
  author: Marc Andreesen
  link: https://a16z.com/the-techno-optimist-manifesto/
  quote: Technology is the glory of human ambition and achievement, the spearhead of progress, and the realization of our potential. For hundreds of years, we properly glorified this - until recently.

- title: How to Do Great Work
  author: Paul Graham
  link: https://paulgraham.com/greatwork.html
  quote: Four steps - choose a field, learn enough to get to the frontier, notice gaps, explore promising ones. This is how practically everyone who's done great work has done it, from painters to physicists.

- title: A Time We Never Knew
  author: Freya India
  link: https://www.afterbabel.com/p/a-time-we-never-knew
  quote: I am homesick for a time when something horrific happened in the world, and instead of immediately opening Twitter, people held each other. A time of more shared feeling, and less frantic analyzing. A time of being both disconnected but supremely connected.

- title: Aim to Get Rejected Often 
  author: Amir
  link: https://amirbolous.com/posts/rejection/
  quote: There is an asymmetric upside when you [intentionally seek out opportunities]. That means you lose very little on your side in terms of time and effort but there is no upper bound on what you may potentially gain!

- title: Software 2.0
  author: Andrej Karpathy
  link: https://karpathy.medium.com/software-2-0-a64152b37c35
  quote: Software 1.0 is code we write. Software 2.0 is code written by the optimization based on an evaluation criterion. It is likely that any setting where the program is not obvious but one can repeatedly evaluate the performance of it will be subject to this transition, because the optimization can find much better code than what a human can write.

- title: What I Wish Someone Had Told Me
  author: Sam Altman
  link: https://blog.samaltman.com/what-i-wish-someone-had-told-me
  quote: Optimism, obsession, self-belief, raw horsepower and personal connections are how things get started.